stages:
  - test

before_script:
  - uname -a
  - docker -v
  - git --no-pager show

variables:
  COMPOSE_HTTP_TIMEOUT: "180"
  COMPOSE_PROJECT_NAME: "test${CI_JOB_ID}"
  CANOPSIS_DISTRIBUTION: "debian-9"
  CANOPSIS_TAG: "ci"
  CANOPSIS_UIV2_BRICKS_TAG: "develop"
  CANOPSIS_DOCKER_MODE: "test-ci"
  CANOPSIS_CATAG_TOKEN: "not_using_it"
  CANOPSIS_ENV_CONFIRM: "0"
  CANOPSIS_SKIP_GO: "1"
  CANOPSIS_BUILD_NEXT: "0"
  DISPLAY: ":1"
  VUE_APP_API_HOST: "http://localhost:8082"

stage_test:
  stage: test
  tags: ["canopsis"]
  script:
    - ./ci-gitlab.sh
    - Xvfb :1 -screen 0 1024x768x16 &
    - x11vnc -display :1 -bg -nopw -xkb
    - echo "CHROME_DRIVER_PATH=/opt/chrome/bin/chromedriver" > sources/webcore/src/canopsis-next/tests/e2e/.env.local
    - cd sources/webcore/src/canopsis-next && yarn && yarn e2e
  only:
    changes:
      - sources/webcore/src/canopsis-next/**/*
    refs:
      - gitlab-ci/uiv3
  artifacts:
    reports:
      junit:
        - sources/webcore/src/canopsis-next/tests/e2e/reports/**/*.xml
    paths:
      - tests_report

after_script:
  - docker-compose -f docker-compose.ci.yml -p ${COMPOSE_PROJECT_NAME} kill
  - docker-compose -f docker-compose.ci.yml -p ${COMPOSE_PROJECT_NAME} rm -sf
  - docker-compose -f docker-compose.ci.yml -p ${COMPOSE_PROJECT_NAME} down
  - docker volume prune -f
