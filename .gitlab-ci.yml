stages:
  - prebuild
  - build
  - test
  - packaging
  - publish
  - doc
  - clean

prebuild:
  stage: prebuild
  tags: ["canopsis"]
  only:
    - feat-simpler_build
  script:
    - uname -a
    - docker -v
    - git --no-pager show

build_docker_debian8:
  stage: build
  tags: ["canopsis"]
  only:
    - feat-simpler_build
  before_script:

  script:
    - make docker_images DISTRIBUTIONS=debian9

  after_script:
    - make clean_images DISTRIBUTIONS=debian9

