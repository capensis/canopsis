---
- name: Init script of postgres
  command: "initdb --auth-host=md5 --locale=en_US.UTF-8 -D /var/lib/pgsql/data" 
  become: yes
  become_user: postgres

# Module error in the venv, using lineinfile instead of postgresql_pg_hba

