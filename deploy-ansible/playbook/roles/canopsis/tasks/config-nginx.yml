---
- name: Deploy Canopsis default configuration file for Nginx
  template:
    src: nginx/default.j2
    dest: /etc/nginx/conf.d/default.conf
    owner: root
    group: root
    mode: 0644
  vars:
    CPS_OLD_API_URL: "http://{{ canopsis_gunicorn_host }}:{{ canopsis_gunicorn_port }}/"

- name: Deploy Canopsis CORS configuration file for Nginx
  template:
    src: nginx/cors.j2
    dest: /etc/nginx/cors.inc
    owner: root
    group: root
    mode: 0644
